<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMySeat - Login / Register</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>
    <header>
        <h1 class="brand-logo">BookMySeat</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="booking.html">Book Tickets</a>
            <a href="team.html">Meet the Team</a>
            <a href="login.html" class="active">Login</a>
        </nav>
    </header>

    <main>
        <div class="form-container elegant-panel">
            <h2>Authentication</h2>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="text" id="email" placeholder="e.g. member@email.com">
            </div>
            <div class="form-group">
                <label for="password">Password (Min 8 chars, 1 Letter, 1 Number)</label>
                <input type="password" id="password" placeholder="Enter secure passphrase">
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 35px;">
                <button class="btn" onclick="validateAndLogin()" style="flex: 1;">Sign In</button>
                <button class="btn btn-outline" onclick="registerUser()" style="flex: 1;">Create</button>
            </div>
            
            <p id="authMessage" style="color: var(--accent-gold); margin-top: 25px; font-size: 0.9em; font-family: 'Inter', sans-serif; height: 20px;"></p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 BookMySeat. An exclusive cinema experience.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
